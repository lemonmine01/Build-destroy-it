<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Build-destroy-it (Grid Edition)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            background: #1a1a1a;
            font-family: 'VT323', monospace;
            color: white;
            overflow: hidden;
            display: flex;
        }

        /* --- SIDEBAR --- */
        #sidebar {
            width: 280px;
            background: #c6c6c6;
            border-right: 4px solid #000;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            color: #333;
            box-shadow: 5px 0 15px rgba(0,0,0,0.5);
            z-index: 10;
            user-select: none;
        }

        h2 { margin: 0 0 10px 0; text-align: center; color: #404040; text-shadow: 1px 1px 0 #fff; font-size: 32px; }
        h3 { margin: 0 0 5px 0; font-size: 24px; color: #555; }
        
        .section {
            background: #8b8b8b;
            padding: 10px;
            border: 3px solid #373737;
            border-top-color: #fff;
            border-left-color: #fff;
        }

        .btn-group { display: grid; grid-template-columns: repeat(2, 1fr); gap: 5px; }
        
        button {
            font-family: 'VT323', monospace;
            font-size: 18px;
            padding: 8px;
            cursor: pointer;
            background: #7a7a7a;
            color: white;
            border: 2px solid #000;
            border-top-color: #aaa;
            border-left-color: #aaa;
            transition: 0.1s;
        }
        button:hover { background: #8a8a8a; }
        button:active { border-top-color: #000; border-left-color: #000; border-bottom-color: #aaa; border-right-color: #aaa; }
        
        button.active {
            background: #4CAF50;
            border-color: #2E7D32;
            color: white;
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.5);
        }

        .controls { display: flex; flex-direction: column; gap: 10px; margin-top: auto; }
        
        .control-btn {
            background: #2196F3;
            border-color: #0D47A1;
            font-size: 22px;
            padding: 12px;
        }
        .control-btn.danger { background: #f44336; border-color: #b71c1c; }

        #info {
            font-size: 18px;
            text-align: center;
            color: #555;
            margin-top: 10px;
        }

        /* --- GRID BACKGROUND --- */
        #game-area {
            flex-grow: 1;
            position: relative;
            /* Сітка 50x50 пікселів */
            background-size: 50px 50px;
            background-image:
                linear-gradient(to right, #333 1px, transparent 1px),
                linear-gradient(to bottom, #333 1px, transparent 1px);
            background-color: #111;
        }
    </style>
</head>
<body>

    <!-- UI PANEL -->
    <div id="sidebar">
        <h2>Build-destroy-it</h2>

        <!-- MATERIALS -->
        <div class="section">
            <h3>📦 Матеріал</h3>
            <div class="btn-group" id="material-buttons">
                <button class="active" onclick="setMaterial('wood', this)">🪵 Дерево (45)</button>
                <button onclick="setMaterial('brick', this)">🧱 Цегла (115)</button>
                <button onclick="setMaterial('metal', this)">️ Метал (200)</button>
                <button onclick="setMaterial('glass', this)">🪟 Скло (25)</button>
            </div>
        </div>

        <!-- SHAPES -->
        <div class="section">
            <h3>📐 Форма</h3>
            <div class="btn-group" id="shape-buttons">
                <button class="active" onclick="setShape('square', this)"> Квадрат</button>
                <button onclick="setShape('triangle', this)"> Шипи</button>
                <button onclick="setShape('rectangle', this)"> Плоский</button>
                <button onclick="setShape('circle', this)">🔵 Каток</button>
                <button onclick="setShape('hexagon', this)">⬡ Броньокаток</button>
            </div>
        </div>

        <!-- CONTROLS -->
        <div class="controls">
            <button class="control-btn" id="toggleGravity" onclick="toggleGravity()">▶️ ЗАПУСТИТИ ФІЗИКУ</button>
            <button class="control-btn danger" onclick="clearWorld()">️ ОЧИСТИТИ ПОЛЕ</button>
        </div>

        <div id="info">Блоки чіпляються до сітки!</div>
    </div>

    <!-- GAME AREA -->
    <div id="game-area"></div>

    <!-- MATTER.JS LIBRARY -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>

    <script>
        // --- CONFIG ---
        const GRID_SIZE = 50; // Розмір клітини сітки

        const Materials = {
            wood:   { hp: 45,  color: '#8B5A2B', density: 0.002 },
            brick:  { hp: 115, color: '#CD5C5C', density: 0.005 },
            metal:  { hp: 200, color: '#708090', density: 0.010 },
            glass:  { hp: 25,  color: 'rgba(173, 216, 230, 0.6)', density: 0.001 }
        };

        const Shapes = {
            square:   { type: 'static', hpMult: 1.0,  dmgMult: 0,   frictionLoss: 0 },
            rectangle:{ type: 'static', hpMult: 0.5,  dmgMult: 0,   frictionLoss: 0 }, 
            triangle: { type: 'static', hpMult: 0.6,  dmgMult: 0.5, frictionLoss: 0 }, 
            circle:   { type: 'dynamic',hpMult: 0.75, dmgMult: 0.4, frictionLoss: 0.4 }, 
            hexagon:  { type: 'dynamic',hpMult: 0.9,  dmgMult: 0.5, frictionLoss: 0.5 }  
        };

        let selectedMaterial = 'wood';
        let selectedShape = 'square';
        let isGravityOn = false;

        // --- MATTER.JS SETUP ---
        const { Engine, Render, Runner, World, Bodies, Mouse, MouseConstraint, Events, Vector, Body, Composite } = Matter;

        const engine = Engine.create();
        const world = engine.world;
        engine.gravity.y = 0; // Спочатку без гравітації

        const render = Render.create({
            element: document.getElementById('game-area'),
            engine: engine,
            options: {
                width: window.innerWidth - 280,
                height: window.innerHeight,
                wireframes: false,
                background: 'transparent' // Прозорий фон, щоб було видно CSS сітку
            }
        });

        Render.run(render);
        const runner = Runner.create();
        Runner.run(runner, engine);

        // --- WALLS ---
        const width = window.innerWidth - 280;
        const height = window.innerHeight;
        const wallThickness = 60;

        const ground = Bodies.rectangle(width/2, height + 30, width, wallThickness, { isStatic: true, render: { fillStyle: '#444' } });
        const leftWall = Bodies.rectangle(-30, height/2, wallThickness, height, { isStatic: true, render: { visible: false } });
        const rightWall = Bodies.rectangle(width + 30, height/2, wallThickness, height, { isStatic: true, render: { visible: false } });
        World.add(world, [ground, leftWall, rightWall]);

        // --- MOUSE ---
        const mouse = Mouse.create(render.canvas);
        const mouseConstraint = MouseConstraint.create(engine, {
            mouse: mouse,
            constraint: { stiffness: 0.2, render: { visible: false } }
        });
        World.add(world, mouseConstraint);
        render.mouse = mouse;

        // --- BUILDING LOGIC (GRID SNAP) ---
        render.canvas.addEventListener('mousedown', (e) => {
            // Перевірка, чи не клікнули ми на вже існуючий блок (щоб не ставити поверх)
            const bodiesUnderCursor = Matter.Query.point(Composite.allBodies(world), { x: e.offsetX, y: e.offsetY });
            if (bodiesUnderCursor.length > 0 && bodiesUnderCursor[0] !== ground) return; 

            // МАГНІТНЕ ПРИТЯГУВАННЯ ДО СІТКИ
            const snapX = Math.round(e.offsetX / GRID_SIZE) * GRID_SIZE;
            const snapY = Math.round(e.offsetY / GRID_SIZE) * GRID_SIZE;

            spawnBlock(snapX, snapY);
        });

        function spawnBlock(x, y) {
            const mat = Materials[selectedMaterial];
            const shapeCfg = Shapes[selectedShape];
            const maxHp = mat.hp * shapeCfg.hpMult;

            let body;
            const size = GRID_SIZE; // 50px

            const commonOptions = {
                restitution: 0.1, 
                friction: 0.8,    
                density: mat.density,
                render: { fillStyle: mat.color, strokeStyle: '#000', lineWidth: 2 },
                plugin: {
                    gameData: {
                        hp: maxHp, maxHp: maxHp,
                        dmgMult: shapeCfg.dmgMult,
                        frictionLoss: shapeCfg.frictionLoss,
                        type: shapeCfg.type,
                        isWeapon: shapeCfg.dmgMult > 0
                    }
                }
            };

            if (selectedShape === 'square') {
                body = Bodies.rectangle(x, y, size, size, { ...commonOptions, isStatic: true });
            } 
            else if (selectedShape === 'rectangle') {
                // ПЛОСКИЙ БЛОК: ширина 50, висота 25 (половина клітини)
                body = Bodies.rectangle(x, y, size, size * 0.5, { ...commonOptions, isStatic: true });
            }
            else if (selectedShape === 'triangle') {
                body = Bodies.polygon(x, y, 3, size / 1.8, { ...commonOptions, isStatic: true });
            }
            else if (selectedShape === 'circle') {
                body = Bodies.circle(x, y, size / 2 - 2, { ...commonOptions, isStatic: false }); // -2 щоб трохи вільніше котилося
            }
            else if (selectedShape === 'hexagon') {
                body = Bodies.polygon(x, y, 6, size / 2 - 2, { ...commonOptions, isStatic: false });
            }

            if (body) World.add(world, body);
        }

        // --- DAMAGE LOGIC ---
        Events.on(engine, 'collisionStart', (event) => {
            event.pairs.forEach((pair) => {
                const bodyA = pair.bodyA;
                const bodyB = pair.bodyB;
                if (!bodyA.plugin?.gameData || !bodyB.plugin?.gameData) return;

                const dataA = bodyA.plugin.gameData;
                const dataB = bodyB.plugin.gameData;

                const speedA = Vector.magnitude(bodyA.velocity);
                const speedB = Vector.magnitude(bodyB.velocity);
                const impact = Math.max(speedA, speedB);

                if (impact < 1.5) return; // Мінімум швидкості для шкоди

                if (dataA.isWeapon) applyDamage(bodyB, impact * dataA.dmgMult);
                if (dataB.isWeapon) applyDamage(bodyA, impact * dataB.dmgMult);

                // Гальмування катків
                [bodyA, bodyB].forEach(b => {
                    const d = b.plugin.gameData;
                    if (d.type === 'dynamic' && d.frictionLoss > 0) {
                        Body.setVelocity(b, {
                            x: b.velocity.x * (1 - d.frictionLoss),
                            y: b.velocity.y * (1 - d.frictionLoss)
                        });
                    }
                });
            });
        });

        function applyDamage(body, amount) {
            const data = body.plugin.gameData;
            data.hp -= amount;
            body.render.opacity = Math.max(0.2, data.hp / data.maxHp);
            if (data.hp <= 0) World.remove(world, body);
        }

        // --- UI ---
        function setMaterial(mat, btn) {
            selectedMaterial = mat;
            document.querySelectorAll('#material-buttons button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
        function setShape(shape, btn) {
            selectedShape = shape;
            document.querySelectorAll('#shape-buttons button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
        function toggleGravity() {
            isGravityOn = !isGravityOn;
            const btn = document.getElementById('toggleGravity');
            if (isGravityOn) {
                engine.gravity.y = 1;
                btn.textContent = "⏸️ ЗУПИНИТИ";
                btn.style.background = "#f44336";
            } else {
                engine.gravity.y = 0;
                Composite.allBodies(world).forEach(b => Body.setVelocity(b, { x: 0, y: 0 }));
                btn.textContent = "▶️ ЗАПУСТИТИ";
                btn.style.background = "#2196F3";
            }
        }
        function clearWorld() {
            World.clear(world);
            World.add(world, [ground, leftWall, rightWall, mouseConstraint]);
        }
    </script>
</body>
</html>
